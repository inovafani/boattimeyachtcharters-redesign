<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BoatTime Yacht Charters — Gold Coast &amp; Brisbane</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { background: var(--navy); color: var(--cream); margin: 0; }
  body { font-family: var(--font-body); overflow-x: hidden; }
  * { box-sizing: border-box; }
  ::selection { background: var(--gold); color: var(--navy); }
  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.25); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.45); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/StatsBar.jsx"></script>
<script type="text/babel" src="components/Cruises.jsx"></script>
<script type="text/babel" src="components/Fleet.jsx"></script>
<script type="text/babel" src="components/Charters.jsx"></script>
<script type="text/babel" src="components/Destinations.jsx"></script>
<script type="text/babel" src="components/Reviews.jsx"></script>
<script type="text/babel" src="components/CtaBand.jsx"></script>
<script type="text/babel" src="components/Faq.jsx"></script>
<script type="text/babel" src="components/Inquiry.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
const App = () => {
  const inqRef = React.useRef(null);
  const goInq = () => inqRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  const goCruises = () => document.getElementById('cruises')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

  return (
    <>
      <Nav onReserve={goInq}/>
      <Hero onReserve={goInq} onCruises={goCruises}/>
      <StatsBar/>
      <Cruises/>
      <Fleet/>
      <Charters/>
      <CtaBand onInquiry={goInq} onCruises={goCruises}/>
      <Destinations/>
      <Reviews/>
      <Faq/>
      <Inquiry ref={inqRef}/>
      <Footer/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
